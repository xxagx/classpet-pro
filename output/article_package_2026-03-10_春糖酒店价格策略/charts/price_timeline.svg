<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">
    春糖酒店价格时间轴（2026年）
  </text>
  
  <!-- Y-axis -->
  <line x1="80" y1="60" x2="80" y2="340" stroke="#666" stroke-width="2"/>
  
  <!-- X-axis -->
  <line x1="80" y1="340" x2="720" y2="340" stroke="#666" stroke-width="2"/>
  
  <!-- Y-axis labels -->
  <text x="70" y="345" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#666">0</text>
  <text x="70" y="270" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#666">500</text>
  <text x="70" y="195" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#666">1000</text>
  <text x="70" y="120" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#666">1500</text>
  
  <!-- Y-axis title -->
  <text x="25" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666" transform="rotate(-90 25 200)">价格（元/晚）</text>
  
  <!-- Grid lines -->
  <line x1="80" y1="270" x2="720" y2="270" stroke="#ddd" stroke-width="1"/>
  <line x1="80" y1="195" x2="720" y2="195" stroke="#ddd" stroke-width="1"/>
  <line x1="80" y1="120" x2="720" y2="120" stroke="#ddd" stroke-width="1"/>
  
  <!-- Price curve -->
  <path d="M 80 270 L 160 270 L 240 255 L 320 210 L 400 150 L 480 105 L 560 120 L 640 270 L 720 285" 
        fill="none" stroke="#e74c3c" stroke-width="3"/>
  
  <!-- Data points -->
  <circle cx="80" cy="270" r="6" fill="#3498db"/>
  <circle cx="160" cy="270" r="6" fill="#3498db"/>
  <circle cx="240" cy="255" r="6" fill="#f39c12"/>
  <circle cx="320" cy="210" r="6" fill="#f39c12"/>
  <circle cx="400" cy="150" r="6" fill="#e74c3c"/>
  <circle cx="480" cy="105" r="6" fill="#c0392b"/>
  <circle cx="560" cy="120" r="6" fill="#27ae60"/>
  <circle cx="640" cy="270" r="6" fill="#27ae60"/>
  <circle cx="720" cy="285" r="6" fill="#3498db"/>
  
  <!-- X-axis labels -->
  <text x="80" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">D-60</text>
  <text x="160" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">D-45</text>
  <text x="240" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">D-30</text>
  <text x="320" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">D-14</text>
  <text x="400" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">D-7</text>
  <text x="480" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">会期</text>
  <text x="560" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">D+1</text>
  <text x="640" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">D+3</text>
  <text x="720" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">D+7</text>
  
  <!-- Price labels -->
  <text x="80" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3498db" font-weight="bold">¥400</text>
  <text x="240" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f39c12" font-weight="bold">¥530</text>
  <text x="400" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c" font-weight="bold">¥980</text>
  <text x="480" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c0392b" font-weight="bold">¥1350</text>
  <text x="640" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60" font-weight="bold">¥380</text>
  
  <!-- Legend -->
  <rect x="500" y="70" width="200" height="80" fill="white" stroke="#ddd" stroke-width="1" rx="5"/>
  <text x="510" y="90" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">预订建议</text>
  <circle cx="520" cy="110" r="5" fill="#3498db"/>
  <text x="535" y="114" font-family="Arial, sans-serif" font-size="11" fill="#666">最佳预订期</text>
  <circle cx="520" cy="130" r="5" fill="#f39c12"/>
  <text x="535" y="134" font-family="Arial, sans-serif" font-size="11" fill="#666">可接受</text>
  <circle cx="610" cy="110" r="5" fill="#e74c3c"/>
  <text x="625" y="114" font-family="Arial, sans-serif" font-size="11" fill="#666">尽量避免</text>
  <circle cx="610" cy="130" r="5" fill="#27ae60"/>
  <text x="625" y="134" font-family="Arial, sans-serif" font-size="11" fill="#666">捡漏期</text>
</svg>