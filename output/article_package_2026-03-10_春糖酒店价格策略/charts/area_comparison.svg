<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" viewBox="0 0 700 400">
  <!-- Background -->
  <rect width="700" height="400" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">
    各区域酒店价格对比
  </text>
  
  <!-- Bar chart -->
  <!-- Core Area -->
  <rect x="100" y="120" width="80" height="180" fill="#e74c3c" rx="4"/>
  <text x="140" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">核心展区</text>
  <text x="140" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">世纪城/西博城</text>
  <text x="140" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">¥1200</text>
  
  <!-- Secondary Area -->
  <rect x="220" y="180" width="80" height="120" fill="#f39c12" rx="4"/>
  <text x="260" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">次级区域</text>
  <text x="260" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">金融城/天府新区</text>
  <text x="260" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f39c12">¥750</text>
  
  <!-- Outer Area -->
  <rect x="340" y="240" width="80" height="60" fill="#27ae60" rx="4"/>
  <text x="380" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">外围区域</text>
  <text x="380" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">双流/龙泉驿</text>
  <text x="380" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#27ae60">¥450</text>
  
  <!-- Benchmark -->
  <rect x="460" y="270" width="80" height="30" fill="#3498db" rx="4"/>
  <text x="500" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">基准价格</text>
  <text x="500" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">平时均价</text>
  <text x="500" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3498db">¥380</text>
  
  <!-- Y-axis -->
  <line x1="80" y1="80" x2="80" y2="300" stroke="#666" stroke-width="2"/>
  <line x1="80" y1="300" x2="580" y2="300" stroke="#666" stroke-width="2"/>
  
  <!-- Y-axis labels -->
  <text x="70" y="305" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#666">0</text>
  <text x="70" y="240" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#666">400</text>
  <text x="70" y="180" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#666">800</text>
  <text x="70" y="120" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#666">1200</text>
  <text x="70" y="60" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#666">1600</text>
  
  <!-- Info panel -->
  <rect x="580" y="80" width="100" height="200" fill="white" stroke="#ddd" stroke-width="1" rx="5"/>
  <text x="630" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">溢价率</text>
  <text x="630" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e74c3c">+216%</text>
  <text x="630" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">核心展区</text>
  <text x="630" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f39c12">+97%</text>
  <text x="630" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">次级区域</text>
  <text x="630" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#27ae60">+18%</text>
  <text x="630" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">外围区域</text>
</svg>