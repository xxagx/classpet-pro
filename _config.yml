# GitHub Pages Configuration
title: ClassPet Pro - 班级宠物养成系统
description: 为教室希沃触摸一体机开发的班级互动宠物养成系统
url: https://fwei19921-dotcom.github.io/classpet-pro1.0/

# Disable Jekyll theme to use static files directly
theme: null

# GitHub Pages Settings
exclude:
  - .github/
  - README.md
  - CHANGELOG.md
  - DEPLOYMENT.md
  - DEPLOYMENT_CHECKLIST.md
  - PUBLISH_GUIDE.md
  - CREATE_GITHUB_REPO.md
  - GITHUB_PUSH_COMMANDS.sh
  - push_to_github.sh
  - quick-push.sh

# Build settings
markdown: kramdown

# Include all static files
include:
  - assets/
  - js/
  - css/
