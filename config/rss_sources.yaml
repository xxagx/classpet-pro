---
# 抓取策略
fetch_strategy:
  frequency: "daily"
  time: "06:00"
  max_items_per_source: 10
  total_max_items: 300
  
# AI筛选标准
filter_criteria:
  relevance_threshold: 0.7
  novelty_threshold: 0.6
  actionability_threshold: 0.5
  
# 输出目标
output_targets:
  daily_digest: true
  top_10_topics: true
  selected_articles: 3
  video_script: 1
