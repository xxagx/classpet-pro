<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>移动端诊断工具 - ClassPet Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        
        .btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(240, 147, 251, 0.5);
            transition: all 0.3s;
            margin: 10px 5px;
        }
        
        .btn:hover {
            transform: scale(1.05);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #4CAF50, #8BC34A);
        }
        
        .test-section {
            margin-bottom: 20px;
        }
        
        .test-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #ddd;
        }
        
        .test-item.pass {
            border-left-color: #4CAF50;
            background: #e8f5e9;
        }
        
        .test-item.fail {
            border-left-color: #f44336;
            background: #ffebee;
        }
        
        .test-item.warning {
            border-left-color: #ff9800;
            background: #fff3e0;
        }
        
        .test-name {
            font-weight: 500;
            color: #333;
            flex: 1;
        }
        
        .test-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }
        
        .status-pass {
            background: #4CAF50;
            color: white;
        }
        
        .status-fail {
            background: #f44336;
            color: white;
        }
        
        .status-warning {
            background: #ff9800;
            color: white;
        }
        
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
        
        .summary-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .summary-item {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .summary-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .log-output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
            margin: 15px 0;
        }
        
        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-bottom: 1px solid #333;
        }
        
        .log-info { color: #4CAF50; }
        .log-warn { color: #ff9800; }
        .log-error { color: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 移动端全面诊断工具</h1>
            <p>ClassPet Pro - 移动端问题定位与修复验证</p>
        </div>
        
        <div class="card">
            <h2>🚀 诊断操作</h2>
            <div style="text-align: center; padding: 20px;">
                <button class="btn" onclick="runFullDiagnosis()">▶️ 开始全面诊断</button>
                <button class="btn btn-success" onclick="openMobile()">📱 打开移动端</button>
                <button class="btn" onclick="clearLogs()">🗑️ 清空日志</button>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 0%;">准备就绪</div>
            </div>
        </div>
        
        <div class="card">
            <h2>📋 诊断项目</h2>
            <div class="test-section" id="diagnosisResults"></div>
        </div>
        
        <div class="card">
            <h2>📊 实时日志</h2>
            <div class="log-output" id="logOutput"></div>
        </div>
        
        <div class="card">
            <h2>✅ 诊断总结</h2>
            <div class="summary-box">
                <div class="summary-grid">
                    <div class="summary-item">
                        <div class="summary-value" id="totalTests">0</div>
                        <div class="summary-label">总检测项</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value" id="passedTests">0</div>
                        <div class="summary-label">通过</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value" id="failedTests">0</div>
                        <div class="summary-label">失败</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value" id="passRate">0%</div>
                        <div class="summary-label">通过率</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let testResults = { total: 0, passed: 0, failed: 0 };
        
        function updateProgress(percentage, text) {
            const bar = document.getElementById('progressBar');
            bar.style.width = percentage + '%';
            bar.textContent = text || percentage + '%';
        }
        
        function addLog(message, type = 'info') {
            const logOutput = document.getElementById('logOutput');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logOutput.appendChild(entry);
            logOutput.scrollTop = logOutput.scrollHeight;
        }
        
        function clearLogs() {
            document.getElementById('logOutput').innerHTML = '';
            addLog('日志已清空', 'info');
        }
        
        function addTestResult(name, status, message) {
            const container = document.getElementById('diagnosisResults');
            const item = document.createElement('div');
            item.className = `test-item ${status}`;
            
            const statusText = {
                'pass': '✓ 通过',
                'fail': '✗ 失败',
                'warning': '⚠️ 警告'
            };
            
            const statusClass = {
                'pass': 'status-pass',
                'fail': 'status-fail',
                'warning': 'status-warning'
            };
            
            item.innerHTML = `
                <div class="test-name">${name}</div>
                <div class="test-status ${statusClass[status]}">${statusText[status]} ${message || ''}</div>
            `;
            
            container.appendChild(item);
            
            testResults.total++;
            if (status === 'pass') testResults.passed++;
            if (status === 'fail') testResults.failed++;
            updateSummary();
        }
        
        function updateSummary() {
            document.getElementById('totalTests').textContent = testResults.total;
            document.getElementById('passedTests').textContent = testResults.passed;
            document.getElementById('failedTests').textContent = testResults.failed;
            const rate = testResults.total === 0 ? 0 : Math.round(testResults.passed / testResults.total * 100);
            document.getElementById('passRate').textContent = rate + '%';
        }
        
        function runFullDiagnosis() {
            testResults = { total: 0, passed: 0, failed: 0 };
            document.getElementById('diagnosisResults').innerHTML = '';
            updateProgress(0, '开始诊断...');
            addLog('=== 开始全面诊断 ===', 'info');
            
            // 1. HTML 结构检查
            setTimeout(() => checkHTMLStructure(), 500);
            // 2. CSS 资源检查
            setTimeout(() => checkCSSResources(), 2000);
            // 3. JavaScript 文件检查
            setTimeout(() => checkJSFiles(), 3500);
            // 4. DOM 元素检查
            setTimeout(() => checkDOMElements(), 5000);
            // 5. 事件监听器检查
            setTimeout(() => checkEventListeners(), 6500);
            // 6. 数据一致性检查
            setTimeout(() => checkDataConsistency(), 8000);
            // 7. 移动端适配检查
            setTimeout(() => checkMobileAdaptation(), 9500);
            // 8. 生成报告
            setTimeout(() => generateReport(), 11000);
        }
        
        function checkHTMLStructure() {
            updateProgress(10, '检查 HTML 结构...');
            addLog('开始检查 HTML 结构...', 'info');
            
            try {
                // 检查 mobile.html 是否存在
                fetch('mobile.html')
                    .then(res => {
                        if (res.ok) {
                            addTestResult('HTML 文件存在', 'pass', 'mobile.html');
                            addLog('✓ mobile.html 文件存在', 'info');
                        } else {
                            addTestResult('HTML 文件存在', 'fail', '文件不存在');
                            addLog('✗ mobile.html 文件不存在', 'error');
                        }
                    })
                    .catch(err => {
                        addTestResult('HTML 文件存在', 'fail', err.message);
                        addLog(`✗ 加载失败：${err.message}`, 'error');
                    });
            } catch (e) {
                addTestResult('HTML 文件存在', 'fail', e.message);
                addLog(`✗ 检查失败：${e.message}`, 'error');
            }
            
            updateProgress(15, 'HTML 结构检查完成');
        }
        
        function checkCSSResources() {
            updateProgress(20, '检查 CSS 资源...');
            addLog('开始检查 CSS 资源...', 'info');
            
            try {
                // 检查 mobile.css
                fetch('assets/css/mobile.css')
                    .then(res => {
                        if (res.ok) {
                            addTestResult('CSS 文件加载', 'pass', 'mobile.css');
                            addLog('✓ mobile.css 加载成功', 'info');
                        } else {
                            addTestResult('CSS 文件加载', 'fail', '文件不存在');
                            addLog('✗ mobile.css 加载失败', 'error');
                        }
                    })
                    .catch(err => {
                        addTestResult('CSS 文件加载', 'fail', err.message);
                        addLog(`✗ CSS 加载失败：${err.message}`, 'error');
                    });
            } catch (e) {
                addTestResult('CSS 文件加载', 'fail', e.message);
            }
            
            updateProgress(30, 'CSS 资源检查完成');
        }
        
        function checkJSFiles() {
            updateProgress(35, '检查 JavaScript 文件...');
            addLog('开始检查 JavaScript 文件...', 'info');
            
            const jsFiles = [
                'js/data-manager.js',
                'js/pets.js',
                'js/pet-database.js',
                'js/mobile.js'
            ];
            
            jsFiles.forEach(file => {
                fetch(file)
                    .then(res => {
                        if (res.ok) {
                            addTestResult(`JS 文件：${file}`, 'pass', '存在');
                            addLog(`✓ ${file} 加载成功`, 'info');
                        } else {
                            addTestResult(`JS 文件：${file}`, 'fail', '不存在');
                            addLog(`✗ ${file} 加载失败`, 'error');
                        }
                    })
                    .catch(err => {
                        addTestResult(`JS 文件：${file}`, 'fail', err.message);
                        addLog(`✗ ${file} 错误：${err.message}`, 'error');
                    });
            });
            
            updateProgress(45, 'JavaScript 文件检查完成');
        }
        
        function checkDOMElements() {
            updateProgress(50, '检查 DOM 元素...');
            addLog('开始检查关键 DOM 元素...', 'info');
            
            // 由于在诊断工具中无法直接访问 mobile.html 的 DOM，
            // 我们通过 fetch 获取 HTML 并解析
            fetch('mobile.html')
                .then(res => res.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    
                    const criticalElements = [
                        { id: 'welcomeModal', name: '欢迎弹窗' },
                        { id: 'btnWelcome', name: '开启旅程按钮' },
                        { id: 'loginPage', name: '登录页面' },
                        { id: 'studentSelect', name: '学生选择器' },
                        { id: 'btnLogin', name: '登录按钮' },
                        { id: 'petPage', name: '宠物页面' }
                    ];
                    
                    criticalElements.forEach(el => {
                        const element = doc.getElementById(el.id);
                        if (element) {
                            addTestResult(`DOM 元素：${el.name}`, 'pass', `#${el.id}`);
                            addLog(`✓ ${el.name} (#${el.id}) 存在`, 'info');
                        } else {
                            addTestResult(`DOM 元素：${el.name}`, 'fail', `#${el.id} 不存在`);
                            addLog(`✗ ${el.name} (#${el.id}) 不存在`, 'error');
                        }
                    });
                })
                .catch(err => {
                    addTestResult('DOM 元素检查', 'fail', err.message);
                    addLog(`✗ DOM 检查失败：${err.message}`, 'error');
                });
            
            updateProgress(60, 'DOM 元素检查完成');
        }
        
        function checkEventListeners() {
            updateProgress(65, '检查事件监听器...');
            addLog('开始检查事件监听器配置...', 'info');
            
            // 检查 mobile.js 中的事件监听器代码
            fetch('js/mobile.js')
                .then(res => res.text())
                .then(code => {
                    const hasClickHandler = code.includes('addEventListener') && code.includes('click');
                    const hasTouchHandler = code.includes('touchstart');
                    const hasWelcomeHandler = code.includes('handleWelcomeClick');
                    
                    if (hasClickHandler) {
                        addTestResult('点击事件监听器', 'pass', '已配置');
                        addLog('✓ 点击事件监听器已配置', 'info');
                    } else {
                        addTestResult('点击事件监听器', 'fail', '未配置');
                        addLog('✗ 点击事件监听器未配置', 'error');
                    }
                    
                    if (hasTouchHandler) {
                        addTestResult('触摸事件监听器', 'pass', '已配置');
                        addLog('✓ 触摸事件监听器已配置', 'info');
                    } else {
                        addTestResult('触摸事件监听器', 'warning', '未配置（移动端可能需要）');
                        addLog('⚠ 触摸事件监听器未配置', 'warn');
                    }
                    
                    if (hasWelcomeHandler) {
                        addTestResult('欢迎按钮处理函数', 'pass', '已实现');
                        addLog('✓ handleWelcomeClick 函数已实现', 'info');
                    } else {
                        addTestResult('欢迎按钮处理函数', 'fail', '未实现');
                        addLog('✗ handleWelcomeClick 函数未实现', 'error');
                    }
                })
                .catch(err => {
                    addTestResult('事件监听器检查', 'fail', err.message);
                });
            
            updateProgress(70, '事件监听器检查完成');
        }
        
        function checkDataConsistency() {
            updateProgress(75, '检查数据一致性...');
            addLog('开始检查 localStorage 数据...', 'info');
            
            try {
                const students = localStorage.getItem('classpet_students');
                const config = localStorage.getItem('classpet_config');
                
                if (students) {
                    const studentList = JSON.parse(students);
                    addTestResult('学生数据', 'pass', `${studentList.length} 个学生`);
                    addLog(`✓ 学生数据存在：${studentList.length} 个学生`, 'info');
                } else {
                    addTestResult('学生数据', 'warning', '数据为空');
                    addLog('⚠ 学生数据为空', 'warn');
                }
                
                if (config) {
                    const configData = JSON.parse(config);
                    addTestResult('配置数据', 'pass', configData.className || '默认配置');
                    addLog(`✓ 配置数据存在：${configData.className || '默认'}`, 'info');
                } else {
                    addTestResult('配置数据', 'warning', '数据为空');
                    addLog('⚠ 配置数据为空', 'warn');
                }
            } catch (e) {
                addTestResult('数据一致性检查', 'fail', e.message);
                addLog(`✗ 数据检查失败：${e.message}`, 'error');
            }
            
            updateProgress(85, '数据一致性检查完成');
        }
        
        function checkMobileAdaptation() {
            updateProgress(90, '检查移动端适配...');
            addLog('开始检查移动端适配...', 'info');
            
            // 检查 viewport 设置
            fetch('mobile.html')
                .then(res => res.text())
                .then(html => {
                    const hasViewport = html.includes('viewport');
                    const hasAppleSupport = html.includes('apple-mobile-web-app-capable');
                    
                    if (hasViewport) {
                        addTestResult('Viewport 配置', 'pass', '已配置');
                        addLog('✓ Viewport 配置正确', 'info');
                    } else {
                        addTestResult('Viewport 配置', 'fail', '未配置');
                        addLog('✗ Viewport 配置缺失', 'error');
                    }
                    
                    if (hasAppleSupport) {
                        addTestResult('iOS 支持', 'pass', '已配置');
                        addLog('✓ iOS 支持已配置', 'info');
                    } else {
                        addTestResult('iOS 支持', 'warning', '未配置');
                        addLog('⚠ iOS 支持未配置', 'warn');
                    }
                    
                    // 检查 CSS 中的响应式设置
                    fetch('assets/css/mobile.css')
                        .then(res => res.text())
                        .then(css => {
                            const hasMediaQueries = css.includes('@media');
                            const hasMaxWidth = css.includes('max-width');
                            
                            if (hasMediaQueries) {
                                addTestResult('CSS 媒体查询', 'pass', '已配置');
                                addLog('✓ CSS 媒体查询已配置', 'info');
                            } else {
                                addTestResult('CSS 媒体查询', 'warning', '未配置');
                                addLog('⚠ CSS 媒体查询未配置', 'warn');
                            }
                            
                            if (hasMaxWidth) {
                                addTestResult('响应式布局', 'pass', '已配置');
                                addLog('✓ 响应式布局已配置', 'info');
                            } else {
                                addTestResult('响应式布局', 'warning', '未配置');
                                addLog('⚠ 响应式布局未配置', 'warn');
                            }
                        })
                        .catch(err => {
                            addTestResult('CSS 适配检查', 'fail', err.message);
                        });
                })
                .catch(err => {
                    addTestResult('移动端适配检查', 'fail', err.message);
                });
            
            updateProgress(95, '移动端适配检查完成');
        }
        
        function generateReport() {
            updateProgress(100, '生成诊断报告...');
            addLog('=== 生成诊断报告 ===', 'info');
            
            const rate = Math.round(testResults.passed / testResults.total * 100);
            let message = '';
            let recommendation = '';
            
            if (rate >= 90) {
                message = '🎉 优秀！移动端状态良好';
                recommendation = '建议：继续监控性能，定期维护';
                addLog(message, 'info');
            } else if (rate >= 70) {
                message = '✅ 良好！基本功能正常';
                recommendation = '建议：修复标记为警告的项目';
                addLog(message, 'info');
            } else {
                message = '⚠️ 注意！存在需要修复的问题';
                recommendation = '建议：立即修复所有失败项目';
                addLog(message, 'warn');
            }
            
            addLog(`诊断完成：${testResults.total} 项检测，${testResults.passed} 项通过，${testResults.failed} 项失败`, 'info');
            addLog(`通过率：${rate}%`, 'info');
            addLog(recommendation, 'info');
            
            updateProgress(100, `${message} - 通过率 ${rate}%`);
            
            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function openMobile() {
            window.open('mobile.html', '_blank');
        }
        
        // 页面加载时自动显示日志
        window.addEventListener('DOMContentLoaded', () => {
            addLog('移动端诊断工具已加载', 'info');
            addLog('点击"开始全面诊断"按钮进行检查', 'info');
        });
    </script>
</body>
</html>
