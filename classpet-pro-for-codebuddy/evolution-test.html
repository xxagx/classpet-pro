<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 阶段进化系统测试 - Think-AI 俱乐部---贝贝老师</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/evolution-system.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        
        .header p {
            font-size: 18px;
            opacity: 0.9;
        }
        
        .stages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stage-card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease;
        }
        
        .stage-card:hover {
            transform: translateY(-5px);
        }
        
        .stage-header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .stage-emoji {
            font-size: 60px;
            display: block;
            margin-bottom: 10px;
        }
        
        .stage-title {
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 10px #FFD700;
        }
        
        .stage-details {
            font-size: 14px;
            line-height: 1.8;
            opacity: 0.9;
        }
        
        .score-range {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .pet-size {
            display: inline-block;
            background: rgba(255,215,0,0.2);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .test-section {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        
        .test-section h2 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #FFD700;
        }
        
        .score-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .score-input {
            flex: 1;
            min-width: 200px;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
        }
        
        .score-input:focus {
            outline: none;
            border-color: #FFD700;
        }
        
        .btn-test {
            padding: 15px 30px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            border-radius: 10px;
            color: #1e3c72;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .btn-test:hover {
            transform: scale(1.05);
        }
        
        .btn-test:active {
            transform: scale(0.95);
        }
        
        .evolution-result {
            margin-top: 30px;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            text-align: center;
        }
        
        .branding {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(255,105,180,0.2), rgba(255,20,147,0.2));
            border-radius: 15px;
            border: 2px solid rgba(255,105,180,0.3);
        }
        
        .branding-text {
            font-size: 20px;
            font-weight: bold;
            color: #FF69B4;
            text-shadow: 0 0 10px #FF69B4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 ClassPet Pro 8 阶段进化系统</h1>
            <p>🚀 Think-AI 俱乐部 --- 贝贝老师荣誉出品 🚀</p>
        </div>
        
        <!-- 8 个阶段展示 -->
        <div class="stages-grid" id="stagesGrid"></div>
        
        <!-- 测试区域 -->
        <div class="test-section">
            <h2>🧪 进化系统测试</h2>
            <p>输入积分，查看宠物进化阶段和视觉效果</p>
            
            <div class="score-input-group">
                <input type="number" id="scoreInput" class="score-input" placeholder="输入宠物积分 (0-2000+)" value="0">
                <button class="btn-test" onclick="testEvolution()">测试进化</button>
            </div>
            
            <div id="evolutionResult" class="evolution-result" style="display: none;"></div>
        </div>
        
        <!-- 品牌标识 -->
        <div class="branding">
            <div class="branding-text">
                🤖 Think-AI 俱乐部 | 贝贝老师
            </div>
            <p style="margin-top: 10px; opacity: 0.8;">
                ClassPet Pro 班级宠物养成系统 - 完整 8 阶段进化体系
            </p>
        </div>
    </div>
    
    <script src="js/pets.js"></script>
    <script>
        // 渲染 8 个阶段卡片
        function renderStages() {
            const grid = document.getElementById('stagesGrid');
            const stages = window.EVOLUTION_STAGES;
            const petImageManager = new window.PetImageManager();
            const pets = petImageManager.getCurrentPets();
            
            let html = '';
            let stageIndex = 0;
            
            for (const key in stages) {
                const stage = stages[key];
                const pet = pets[stageIndex] || { emoji: '', color: '#fff' };
                
                html += `
                    <div class="stage-card" id="card-${key}">
                        <div class="stage-header">
                            <span class="stage-emoji" style="filter: drop-shadow(0 0 10px ${stage.frameColor});">
                                ${pet.emoji}
                            </span>
                            <div class="stage-title">${stage.name}</div>
                        </div>
                        <div class="stage-details">
                            <div class="score-range">
                                📊 ${stage.minScore} - ${stage.maxScore === Infinity ? '∞' : stage.maxScore} 分
                            </div>
                            <div style="margin: 10px 0;">
                                ${stage.description}
                            </div>
                            <div class="pet-size">
                                📏 体型：${stage.size}px
                            </div>
                            <div class="pet-size" style="background: rgba(${hexToRgb(stage.frameColor)}, 0.2);">
                                🎨 边框色：${stage.frameColor}
                            </div>
                            <div class="pet-size">
                                ✨ 特效：${stage.frameEffect}
                            </div>
                        </div>
                    </div>
                `;
                
                stageIndex++;
            }
            
            grid.innerHTML = html;
        }
        
        // 测试进化
        function testEvolution() {
            const score = parseInt(document.getElementById('scoreInput').value) || 0;
            const resultDiv = document.getElementById('evolutionResult');
            const evolutionManager = new window.EvolutionManager();
            const petImageManager = new window.PetImageManager();
            const pets = petImageManager.getCurrentPets();
            
            const currentStage = evolutionManager.getStageByScore(score);
            const stageIndex = evolutionManager.getStageIndex(currentStage.key);
            const pet = pets[stageIndex] || { emoji: '🥚' };
            
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div class="stage-emoji" style="font-size: 80px; filter: drop-shadow(0 0 20px ${currentStage.frameColor});">
                    ${pet.emoji}
                </div>
                <h3 style="font-size: 32px; color: ${currentStage.frameColor}; margin: 20px 0;">
                    ${currentStage.name}
                </h3>
                <p style="font-size: 18px; margin: 10px 0;">
                    ${currentStage.description}
                </p>
                <div style="margin: 20px 0;">
                    <div style="font-size: 24px; font-weight: bold; color: #FFD700;">
                        当前积分：${score} 分
                    </div>
                    <div style="margin-top: 10px;">
                        进度：${evolutionManager.getProgressPercentage(score, currentStage).toFixed(1)}%
                    </div>
                    ${evolutionManager.getScoreForNextStage(score, currentStage) > 0 ? `
                        <div style="margin-top: 10px; color: #FF6B6B;">
                            还需 ${evolutionManager.getScoreForNextStage(score, currentStage)} 分进入下一阶段
                        </div>
                    ` : `
                        <div style="margin-top: 10px; color: #4CAF50; font-weight: bold;">
                            🎉 已达最高阶段！
                        </div>
                    `}
                </div>
                <div class="stage-visual" style="
                    width: ${currentStage.size}px;
                    height: ${currentStage.size}px;
                    border-color: ${currentStage.frameColor};
                    animation: ${currentStage.frameEffect} 3s infinite;
                    margin: 30px auto;
                ">
                    <div style="font-size: ${currentStage.size * 0.6}px;">
                        ${pet.emoji}
                    </div>
                </div>
            `;
            
            // 滚动到结果区域
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        
        // 辅助函数：hex 转 rgb
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? 
                `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : 
                '255, 255, 255';
        }
        
        // 初始化
        renderStages();
    </script>
</body>
</html>
